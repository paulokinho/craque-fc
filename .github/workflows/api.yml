name: API — Build, Scan & Push

on:
  push:
    branches: [master]
    paths:
      - 'apps/api/**'
      - '.github/workflows/api.yml'
  pull_request:
    branches: [master]
    paths:
      - 'apps/api/**'

concurrency:
  group: api-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api
  LOCAL_TAG: craque-api:scan

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      # Single build → local docker daemon for Trivy scan.
      # Registry cache makes subsequent builds near-instant.
      - name: Build image (local only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          load: true
          tags: ${{ env.LOCAL_TAG }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true
          provenance: false

      # Install Trivy separately for speed + caching control
      - name: Install Trivy
        run: |
          TRIVY_VERSION="0.69.3"
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            | tar -xzf - -C /usr/local/bin trivy

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: /tmp/trivy-db
          key: trivy-db-${{ github.run_id }}
          restore-keys: trivy-db-

      - name: Trivy CVE scan
        run: |
          trivy image \
            --cache-dir /tmp/trivy-db \
            --severity MEDIUM,HIGH,CRITICAL \
            --ignore-unfixed \
            --scanners vuln \
            --exit-code 1 \
            --timeout 5m \
            --format table \
            ${{ env.LOCAL_TAG }}

      # Push only on master + scan passed. Reuses cached layers — no rebuild.
      - name: Push to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          provenance: false
