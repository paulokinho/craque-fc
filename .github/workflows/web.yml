name: Web — Build, Scan & Push

on:
  push:
    branches: [master]
    paths:
      - 'apps/web/**'
      - '.github/workflows/web.yml'
  pull_request:
    branches: [master]
    paths:
      - 'apps/web/**'

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/web
  LOCAL_TAG: craque-web:scan

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      # ── Setup ───────────────────────────────────────────────────
      - name: Checkout (sparse)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            apps/web
            package.json
            .dockerignore
          sparse-checkout-cone-mode: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Build once → local daemon (for Trivy) ──────────────────
      - name: Build image (local only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile.prod
          load: true
          tags: ${{ env.LOCAL_TAG }}
          build-args: |
            VITE_API_URL=https://craquefc.app/api
            VITE_WS_URL=wss://craquefc.app/ws
            VITE_STRIPE_PUBLISHABLE_KEY=pk_live_placeholder
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true
          provenance: false

      # ── Scan ────────────────────────────────────────────────────
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: /tmp/trivy-db
          key: trivy-db-${{ github.run_id }}
          restore-keys: trivy-db-

      - name: Trivy CVE scan
        uses: aquasecurity/trivy-action@0.28.0
        env:
          TRIVY_CACHE_DIR: /tmp/trivy-db
        with:
          image-ref: ${{ env.LOCAL_TAG }}
          format: 'table'
          exit-code: '1'
          severity: 'MEDIUM,HIGH,CRITICAL'
          ignore-unfixed: true
          scanners: 'vuln'
          timeout: '5m'

      # ── Push (master only, scan passed) ─────────────────────────
      - name: Push to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=https://craquefc.app/api
            VITE_WS_URL=wss://craquefc.app/ws
            VITE_STRIPE_PUBLISHABLE_KEY=pk_live_placeholder
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          provenance: false
