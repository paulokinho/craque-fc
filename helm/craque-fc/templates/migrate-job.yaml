apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "craque-fc.fullname" . }}-migrate-{{ .Release.Revision }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "craque-fc.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrations
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  ttlSecondsAfterFinished: {{ .Values.migrations.ttlSecondsAfterFinished }}
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "craque-fc.labels" . | nindent 8 }}
        app.kubernetes.io/component: migrations
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Never
      containers:
        - name: migrate
          image: {{ include "craque-fc.image" (dict "global" .Values.global "image" .Values.migrations.image) }}
          imagePullPolicy: {{ .Values.migrations.image.pullPolicy }}
          command: ["npm", "run", "migrate"]
          envFrom:
            - configMapRef:
                name: {{ include "craque-fc.fullname" . }}-config
            - secretRef:
                name: {{ include "craque-fc.fullname" . }}-secret
