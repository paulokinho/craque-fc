global:
  imageRegistry: ""
  imagePullSecrets: []
  nameOverride: ""

namespace:
  create: true
  name: craque-fc

api:
  image:
    repository: craque-fc/api
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 2
  port: 3001
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
  env: []
  probes:
    liveness:
      path: /health
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      path: /health
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3

web:
  image:
    repository: craque-fc/web
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 2
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

worker:
  image:
    repository: craque-fc/worker
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

dragonfly:
  enabled: true
  image:
    repository: docker.dragonflydb.io/dragonflydb/dragonfly
    tag: latest
    pullPolicy: IfNotPresent
  port: 6379
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  args:
    - "--proactor_threads=2"
    - "--cache_mode=true"

migrations:
  image:
    repository: craque-fc/api
    tag: latest
    pullPolicy: IfNotPresent
  ttlSecondsAfterFinished: 300
  backoffLimit: 3

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: craquefc.app
      paths:
        - path: /api
          pathType: Prefix
          service: api
        - path: /
          pathType: Prefix
          service: web
  tls:
    - secretName: craque-fc-tls
      hosts:
        - craquefc.app
