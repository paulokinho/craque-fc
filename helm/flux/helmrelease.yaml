apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: craque-fc
  namespace: flux-system
spec:
  interval: 5m
  chart:
    spec:
      chart: craque-fc
      version: ">=0.1.0"
      sourceRef:
        kind: HelmRepository
        name: craque-fc
        namespace: flux-system
      interval: 1m
  targetNamespace: craque-fc
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: craque-fc-values
      optional: true
